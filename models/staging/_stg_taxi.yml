              arguments:
                values: [1, 2, 3, 4, 5, 6, 99]
              config:
                severity: warn

      - name: pickup_location_id
        description: "TLC Taxi Zone in which the taximeter was engaged. Joins to taxi_zone_lookup seed."

      - name: dropoff_location_id
        description: "TLC Taxi Zone in which the taximeter was disengaged. Joins to taxi_zone_lookup seed."

      - name: pickup_datetime
        description: "The date and time when the meter was engaged. Converted from Unix microseconds (lpep_pickup_datetime)."
        tests:
          - not_null

      - name: dropoff_datetime
        description: "The date and time when the meter was disengaged. Converted from Unix microseconds (lpep_dropoff_datetime)."
        tests:
          - not_null

      - name: passenger_count
        description: "The number of passengers in the vehicle. Filtered to 1-8."

      - name: trip_distance
        description: "The elapsed trip distance in miles reported by the taximeter. Filtered to 0-200 miles."

      - name: store_and_fwd_flag
        description: >
          Indicates whether the trip record was held in vehicle memory before sending to the vendor.
          Y = store and forward trip, N = not a store and forward trip.

      - name: payment_type
        description: >
          Numeric code signifying how the passenger paid.
          0 = Flex Fare trip, 1 = Credit card, 2 = Cash,
          3 = No charge, 4 = Dispute, 5 = Unknown, 6 = Voided trip.
        tests:
          - accepted_values:
              arguments:
                values: [0, 1, 2, 3, 4, 5, 6]
              config:
                severity: warn

      - name: trip_duration_minutes
        description: "Derived field. Difference in minutes between pickup_datetime and dropoff_datetime. Filtered to positive values only."

      - name: fare_amount
        description: "The time-and-distance fare calculated by the meter. Filtered to 0.50-1000."
        tests:
          - not_null

      - name: extra
        description: "Miscellaneous extras and surcharges."

      - name: mta_tax
        description: "Tax automatically triggered based on the metered rate in use."

      - name: tip_amount
        description: "Tip amount. Automatically populated for credit card tips. Cash tips are not included."

      - name: tolls_amount
        description: "Total amount of all tolls paid in trip."

      - name: improvement_surcharge
        description: "Improvement surcharge assessed at the flag drop. Began being levied in 2015."

      - name: total_amount
        description: "The total amount charged to passengers. Does not include cash tips. Filtered to 0.50-1000."
        tests:
          - not_null

      - name: congestion_surcharge
        description: "Total amount collected in trip for NYS congestion surcharge."

      - name: airport_fee
        description: "Always NULL for green taxis. Yellow taxi only field retained for UNION ALL schema compatibility."

      - name: cbd_congestion_fee
        description: "Per-trip charge for MTA Congestion Relief Zone starting Jan 5 2025. NULL for green in raw data."